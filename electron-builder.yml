appId: com.zhiyu.studio
productName: 智语 Studio
copyright: Copyright © 2025 智语 Studio
directories:
  buildResources: resources
  output: release
files:
  - dist
  - dist-electron
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: 智语 Studio
publish:
  provider: github
  owner: chenyi17610253635-ux
  repo: zhiyu-studio
extraResources:
  - from: resources/llama-bin/
    to: llama-bin/
    filter:
      - "llama-server.exe"
      - "llama-server-impl.dll"
      - "llama-common.dll"
      - "llama.dll"
      - "llama-cli-impl.dll"
      - "ggml.dll"
      - "ggml-base.dll"
      - "ggml-cpu.dll"
      - "ggml-cpu-x64.dll"
      - "ggml-cpu-zen4.dll"
      - "ggml-cuda.dll"
      - "llm_engine_cuda.node"
      - "ggml_llamacpp.dll"
      - "ggml-rpc.dll"
      - "llm_engine.dll"
      - "lmstudiocore.dll"
      - "mtmd.dll"
      - "cublas64_13.dll"
      - "cublasLt64_13.dll"
      - "cudart64_13.dll"
      - "libomp140.x86_64.dll"
      - "MSVCP140.dll"
      - "VCRUNTIME140.dll"
      - "VCRUNTIME140_1.dll"
      - "VCOMP140.dll"
      - "*.json"
